<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background: warm construction yellow → dusk -->
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffc24a"/>
      <stop offset="1" stop-color="#d97f2e"/>
    </linearGradient>
  </defs>
  <rect width="256" height="256" rx="48" fill="url(#bg)"/>

  <!-- Distant crane silhouette -->
  <g opacity="0.35" fill="#3a2814">
    <rect x="36" y="56" width="6" height="120"/>
    <rect x="42" y="56" width="80" height="6"/>
    <rect x="30" y="58" width="20" height="4"/>
    <rect x="110" y="56" width="4" height="14"/>
  </g>

  <!-- Ground line -->
  <rect x="0" y="218" width="256" height="38" fill="#5a3d1f"/>
  <rect x="0" y="218" width="256" height="4" fill="#3a2814"/>

  <!-- Umarell centered -->
  <g transform="translate(78, 60)">
    <!-- Pants -->
    <rect x="32" y="125" width="14" height="42" fill="#2c3a5c"/>
    <rect x="50" y="125" width="14" height="42" fill="#2c3a5c"/>
    <!-- Shoes -->
    <rect x="28" y="161" width="22" height="8" fill="#1a0e04"/>
    <rect x="48" y="161" width="22" height="8" fill="#1a0e04"/>
    <!-- Sweater -->
    <rect x="28" y="80" width="44" height="50" rx="4" fill="#6b5a3a"/>
    <!-- Hands behind back -->
    <rect x="22" y="105" width="8" height="12" rx="2" fill="#e6b888"/>
    <rect x="70" y="105" width="8" height="12" rx="2" fill="#e6b888"/>
    <!-- Neck -->
    <rect x="44" y="72" width="12" height="10" fill="#e6b888"/>
    <!-- Head -->
    <circle cx="50" cy="58" r="20" fill="#e6b888"/>
    <!-- Ears -->
    <circle cx="30" cy="58" r="4" fill="#e6b888"/>
    <circle cx="70" cy="58" r="4" fill="#e6b888"/>
    <!-- White hair around the cap -->
    <path d="M32 58 Q32 40 50 38 Q68 40 68 58" fill="#f0f0f0"/>
    <!-- Flat cap (coppola) -->
    <ellipse cx="50" cy="38" rx="24" ry="7" fill="#3a2814"/>
    <path d="M28 38 Q50 18 72 38 Z" fill="#4a3018"/>
    <rect x="26" y="36" width="48" height="4" fill="#2a1a08"/>
    <!-- Eyes -->
    <circle cx="44" cy="58" r="2.2" fill="#1a0e04"/>
    <circle cx="56" cy="58" r="2.2" fill="#1a0e04"/>
    <!-- White moustache -->
    <path d="M40 66 Q50 71 60 66" stroke="#ffffff" stroke-width="3.5" fill="none" stroke-linecap="round"/>
    <!-- Mouth -->
    <path d="M44 71 Q50 73 56 71" stroke="#1a0e04" stroke-width="1.2" fill="none"/>
  </g>
</svg>
